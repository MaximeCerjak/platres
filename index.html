<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mémoires de Plâtre</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Cinzel:wght@400;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100vw; height: 100vh;
      max-width: 100%;
      overflow: hidden;
      background: #0a0a0a;
      font-family: 'Cormorant Garamond', serif;
      cursor: none;
    }

    /* Custom cursor — caché, remplacé par le spotlight */
    .cursor { display: none; }



    /* Scene */
    .scene {
      position: fixed;
      inset: 0;
      width: 100vw; height: 100vh;
      overflow: hidden;
    }

    #bgVideo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center center;
      padding: 2vh 2vw;
      filter: brightness(0.88) contrast(1.04);
    }

    /* Vignette */
    .scene::after {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.55) 100%);
      pointer-events: none;
      z-index: 5;
    }

    /* ── VOILE FUMÉ avec trou de lampe ── */
    .veil {
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.9);
      pointer-events: none;
      z-index: 7;
      /* Le mask sera mis à jour via JS */
      -webkit-mask-image: radial-gradient(circle 120px at 50% 50%, transparent 0%, transparent 40%, black 80%);
      mask-image: radial-gradient(circle 120px at 50% 50%, transparent 0%, transparent 40%, black 80%);
    }

    /* Title */
    .site-title {
      position: absolute;
      top: 32px; left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 40;
      pointer-events: none;
    }
    .site-title h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(14px, 2vw, 22px);
      font-weight: 400;
      letter-spacing: 0.35em;
      color: rgba(255,255,255,0.75);
      text-transform: uppercase;
    }
    .site-title p {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(11px, 1.2vw, 14px);
      font-weight: 300;
      font-style: italic;
      color: rgba(255,255,255,0.4);
      margin-top: 4px;
      letter-spacing: 0.15em;
    }

    /* Hint */
    .hint {
      position: absolute;
      bottom: 28px; left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      font-family: 'Cinzel', serif;
      z-index: 40;
      pointer-events: none;
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }

    /* Hotspots */
    .hotspot {
      position: absolute;
      border-radius: 50%;
      cursor: none;
      z-index: 20;
    }
    .hotspot::before {
      content: '';
      position: absolute; inset: -4px;
      border-radius: 50%;
      border: 1.5px solid transparent;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }
    .hotspot:hover::before {
      border-color: rgba(255, 240, 200, 0.6);
      box-shadow: 0 0 20px rgba(255, 240, 200, 0.15), inset 0 0 20px rgba(255,240,200,0.05);
    }
    .hotspot .label {
      position: absolute;
      bottom: -28px; left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 12px;
      color: rgba(255,240,200,0.85);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      letter-spacing: 0.05em;
    }
    .hotspot:hover .label { opacity: 1; }

    .hotspot::after {
      content: '';
      position: absolute; inset: 0;
      border-radius: 50%;
      border: 1px solid rgba(255,240,200,0.2);
      opacity: 0;
    }
    .hotspot:hover::after {
      animation: ripple 1.5s ease-out infinite;
    }
    @keyframes ripple {
      0%  { transform: scale(1);   opacity: 0.5; }
      100%{ transform: scale(1.6); opacity: 0;   }
    }

    /* LIGNE 1 */
    #face-L1-1 { left: 1.5%;  top: 4%; width: 13%; height: 30%; }
    #face-L1-2 { left: 15.5%; top: 4%; width: 13%; height: 30%; }
    #face-L1-3 { left: 29.5%; top: 4%; width: 13%; height: 30%; }
    #face-L1-4 { left: 43.5%; top: 4%; width: 13%; height: 30%; }
    #face-L1-5 { left: 57.5%; top: 4%; width: 13%; height: 30%; }
    #face-L1-6 { left: 65.3%; top: 3.6%; width: 13%; height: 30%; }

    /* LIGNE 2 */
    #face-L2-1 { left: 8%;    top: 34%; width: 13%; height: 30%; }
    #face-L2-3 { left: 22%; top: 34%; width: 13%; height: 30%; }
    #face-L2-4 { left: 43.5%; top: 34%; width: 13%; height: 30%; }
    #face-L2-5 { left: 57.5%; top: 34%; width: 13%; height: 30%; }
    #face-L2-6 { left: 33%; top: 34%; width: 13%; height: 30%; }

    /* LIGNE 3 */
    #face-L3-1 { left: 1.5%;  top: 65%; width: 13%; height: 30%; }
    #face-L3-2 { left: 15.5%; top: 65%; width: 13%; height: 30%; }
    #face-L3-3 { left: 43.5%; top: 65%; width: 13%; height: 30%; }
    #face-L3-4 { left: 57.5%; top: 65%; width: 13%; height: 30%; }
    #face-L3-5 { left: 71.5%; top: 65%; width: 13%; height: 30%; }
    #face-L3-6 { left: 85.5%; top: 65%; width: 13%; height: 30%; }

    /* Grain */
    .grain {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 8;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      animation: grain 0.5s steps(1) infinite;
    }
    @keyframes grain {
      0%,100%{background-position:0 0} 10%{background-position:-5% -10%}
      20%{background-position:-15% 5%} 30%{background-position:7% -25%}
      40%{background-position:-5% 25%} 50%{background-position:-15% 10%}
      60%{background-position:15% 0}   70%{background-position:0 15%}
      80%{background-position:3% 35%}  90%{background-position:-10% 10%}
    }
  </style>
</head>
<body>

<!-- Voile fumé avec trou de lampe -->
<div class="veil"></div>

<div class="grain"></div>

<div class="scene">

  <video id="bgVideo" preload="auto" playsinline>
    <source src="Soliman.mp4" type="video/mp4">
  </video>

  <!-- ★ CALEB -->
  <div class="hotspot" id="face-L2-3"
       data-start="3" data-end="20"
       data-name="Caleb">
    <span class="label">Caleb</span>
  </div>

  <!-- ★ LA FILLETTE -->
  <div class="hotspot" id="face-L2-6"
       data-start="20" data-end="36"
       data-name="La fillette">
    <span class="label">La fillette</span>
  </div>

</div>

<!-- Titre au-dessus de tout -->
<div class="site-title">
  <h1>Mémoires de Plâtre</h1>
  <p>Portraits parlants — XIXe siècle</p>
</div>

<div class="hint">Cliquez sur un visage pour l'entendre</div>

<script>
  // ── Masque lampe torche sur le voile ──
  const veil = document.querySelector('.veil');

  document.addEventListener('mousemove', e => {
    const x = (e.clientX / window.innerWidth  * 100).toFixed(2) + '%';
    const y = (e.clientY / window.innerHeight * 100).toFixed(2) + '%';
    const mask = `radial-gradient(circle 130px at ${x} ${y}, transparent 0%, transparent 45%, black 85%)`;
    veil.style.webkitMaskImage = mask;
    veil.style.maskImage = mask;
  });

  const video = document.getElementById('bgVideo');

  video.addEventListener('loadedmetadata', () => {
    video.currentTime = 0;
    video.pause();
  });

  // ── Logique des hotspots ──
  let activeEnd = null;
  let returning = false;

  video.addEventListener('timeupdate', () => {
    if (activeEnd !== null && !returning && video.currentTime >= activeEnd) {
      returning = true;
      video.pause();
      setTimeout(() => {
        video.currentTime = 0;
        activeEnd = null;
        returning = false;
      }, 800);
    }
  });

  document.querySelectorAll('.hotspot').forEach(hotspot => {
    const start = parseFloat(hotspot.dataset.start);
    const end   = parseFloat(hotspot.dataset.end);
    const hasVideo = !isNaN(start) && !isNaN(end);

    hotspot.addEventListener('mouseenter', () => {});
    hotspot.addEventListener('mouseleave', () => {});

    if (!hasVideo) return;

    hotspot.addEventListener('click', () => {
      returning = false;
      activeEnd = end;
      video.pause();
      video.currentTime = start;
      const onSeeked = () => {
        video.removeEventListener('seeked', onSeeked);
        video.play().catch(err => console.warn('play() bloqué:', err));
      };
      video.addEventListener('seeked', onSeeked);
    });
  });
</script>

</body>
</html>
